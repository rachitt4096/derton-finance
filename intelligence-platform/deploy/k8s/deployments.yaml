apiVersion: apps/v1
kind: Deployment
metadata: { name: inference, namespace: derton-intel }
spec:
  replicas: 2
  selector: { matchLabels: { app: inference } }
  template:
    metadata: { labels: { app: inference } }
    spec:
      containers:
        - name: inference
          image: registry/derton-intel-worker:latest
          command: ["python", "-m", "services.inference.predictor"]
          envFrom: [{ secretRef: { name: derton-secrets } }]
          resources:
            requests: { cpu: "1", memory: 2Gi }
            limits:   { cpu: "2", memory: 4Gi }
          readinessProbe:
            exec: { command: ["python", "-c", "import redis,os;redis.from_url(os.environ['REDIS_URL']).ping()"] }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: api, namespace: derton-intel }
spec:
  replicas: 3
  selector: { matchLabels: { app: api } }
  template:
    metadata: { labels: { app: api } }
    spec:
      containers:
        - name: api
          image: registry/derton-intel-api:latest
          ports: [{ containerPort: 8080 }]
          envFrom: [{ secretRef: { name: derton-secrets } }]
          resources:
            requests: { cpu: "250m", memory: 512Mi }
            limits:   { cpu: "1", memory: 1Gi }
          livenessProbe:  { httpGet: { path: /health, port: 8080 }, periodSeconds: 10 }
          readinessProbe: { httpGet: { path: /health, port: 8080 }, periodSeconds: 5 }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: api-hpa, namespace: derton-intel }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: api }
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 65 } }
---
# Ingestion + scanner are singletons via leader election (Lease), so a rolling
# restart never doubles the upstream WS connection or the global ranking.
apiVersion: apps/v1
kind: Deployment
metadata: { name: ingestion, namespace: derton-intel }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: ingestion } }
  template:
    metadata: { labels: { app: ingestion } }
    spec:
      containers:
        - name: ingestion
          image: registry/derton-intel-worker:latest
          command: ["python", "-m", "services.ingestion.ws_client"]
          envFrom: [{ secretRef: { name: derton-secrets } }]
          resources:
            requests: { cpu: "500m", memory: 1Gi }
            limits:   { cpu: "2", memory: 2Gi }
